<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GraphRAG Explorer</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #08080f;
      --bg-mid: #0f0f1a;
      --bg-card: #14142a;
      --border: #2a2a3e;
      --border-focus: #4ecdc4;
      --accent: #4ecdc4;
      --accent2: #6c5ce7;
      --text: #e0e0e0;
      --text-dim: #888;
      --text-muted: #555;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: linear-gradient(180deg, var(--bg-deep) 0%, #12121f 50%, #0a0a14 100%);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Header */
    header {
      padding: 24px 32px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(78,205,196,0.03), rgba(108,92,231,0.03));
    }
    .header-inner {
      max-width: 1200px; margin: 0 auto;
      display: flex; align-items: center; gap: 14px;
    }
    .logo {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .header-inner h1 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(135deg, #4ecdc4, #a8e6cf);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-inner p {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .header-badge {
      margin-left: auto; padding: 4px 12px; border-radius: 8px;
      background: rgba(108,92,231,0.15); color: var(--accent2);
      font-size: 11px; font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
    }

    /* Main Layout */
    main {
      max-width: 1200px; margin: 0 auto; padding: 24px 32px;
    }

    /* Input Section */
    .input-section { margin-bottom: 24px; }
    .sample-btns {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .sample-btn {
      padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: rgba(78,205,196,0.08); color: var(--accent); cursor: pointer;
      font-size: 12px; font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.2s;
    }
    .sample-btn:hover { background: rgba(78,205,196,0.18); }

    textarea {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg-mid); color: var(--text);
      font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
      resize: vertical; line-height: 1.7; transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    .action-row {
      display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap;
    }
    .btn-primary {
      padding: 10px 24px; border-radius: 10px; border: none; cursor: pointer;
      background: linear-gradient(135deg, #4ecdc4, #44b09e);
      color: var(--bg-deep); font-size: 13px; font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(78,205,196,0.3); }
    .btn-primary:disabled {
      background: var(--border); color: var(--text-muted); cursor: wait;
      transform: none; box-shadow: none;
    }
    .btn-secondary {
      padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim); cursor: pointer;
      font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    }
    .btn-secondary:hover { border-color: var(--text-dim); }
    .status-msg {
      font-size: 12px; animation: fadeIn 0.3s ease;
    }
    .status-ok { color: var(--accent); }
    .status-err { color: var(--danger); }

    /* Grid Layout */
    .grid {
      display: grid; grid-template-columns: 1fr 360px; gap: 20px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* Graph Canvas */
    .graph-wrap {
      background: linear-gradient(135deg, #0a0a0f, #1a1a2e);
      border-radius: 16px; border: 1px solid var(--border);
      overflow: hidden; position: relative;
    }
    .graph-wrap svg { display: block; width: 100%; }
    .graph-empty {
      height: 480px; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 14px;
    }

    /* Legend */
    .legend {
      margin-top: 12px; display: flex; flex-wrap: wrap; gap: 16px;
      padding: 12px 16px; border-radius: 10px;
      background: rgba(20,20,35,0.6); border: 1px solid var(--border);
      align-items: center;
    }
    .legend-item {
      display: flex; align-items: center; gap: 5px; font-size: 11px; color: #999;
    }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .legend-stats { margin-left: auto; font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

    /* Node Detail Panel */
    .node-detail {
      margin-top: 12px; padding: 14px 18px; border-radius: 12px;
      background: rgba(20,20,35,0.8); border: 1px solid;
      animation: fadeIn 0.3s ease;
    }
    .node-detail-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .type-badge {
      padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 500;
    }
    .node-detail-name { font-size: 15px; font-weight: 600; color: #fff; }
    .node-relations { font-size: 12px; color: #aaa; line-height: 1.8; }
    .node-relations span { color: var(--accent); }

    /* Stats Panel */
    .stats-panel {
      margin-top: 12px; padding: 14px 18px; border-radius: 12px;
      background: rgba(20,20,35,0.6); border: 1px solid var(--border);
    }
    .stats-title { font-size: 12px; font-weight: 600; color: var(--accent2); margin-bottom: 8px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-item {
      padding: 8px 10px; border-radius: 8px; background: rgba(108,92,231,0.08);
    }
    .stat-value {
      font-size: 20px; font-weight: 700; color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-label { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* Chat Panel */
    .chat-panel {
      display: flex; flex-direction: column; height: 620px;
      border-radius: 14px; border: 1px solid var(--border);
      background: linear-gradient(180deg, #10101a, #0c0c16);
      overflow: hidden;
    }
    .chat-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      background: rgba(78,205,196,0.04);
      display: flex; align-items: center; gap: 8px;
    }
    .chat-header-title { font-size: 13px; font-weight: 600; color: var(--accent); }
    .chat-header-sub { font-size: 10px; color: var(--text-muted); }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 14px 12px;
    }
    .chat-placeholder {
      text-align: center; padding: 40px 12px; color: #444; font-size: 12px; line-height: 2;
    }
    .chat-placeholder-icon { font-size: 28px; margin-bottom: 8px; }
    .msg {
      display: flex; margin-bottom: 10px; animation: fadeIn 0.3s ease;
    }
    .msg-user { justify-content: flex-end; }
    .msg-assistant { justify-content: flex-start; }
    .msg-bubble {
      max-width: 85%; padding: 10px 14px; border-radius: 14px;
      font-size: 13px; line-height: 1.6; white-space: pre-wrap;
    }
    .msg-user .msg-bubble {
      background: linear-gradient(135deg, #4ecdc4, #44b09e);
      color: var(--bg-deep);
    }
    .msg-assistant .msg-bubble {
      background: linear-gradient(135deg, #2a2a3e, #1e1e30);
      color: #ddd; border: 1px solid var(--border);
    }
    .typing-dots {
      display: flex; gap: 5px; padding: 8px 12px; align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    .chat-input {
      padding: 10px 12px; border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .chat-input input {
      flex: 1; padding: 10px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: #0a0a14; color: #ddd;
      font-size: 13px; font-family: 'Noto Sans JP', sans-serif;
    }
    .chat-input input:focus { outline: none; border-color: var(--accent2); }
    .chat-input input:disabled { opacity: 0.4; }
    .btn-send {
      padding: 0 16px; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #6c5ce7, #a55eea);
      color: #fff; font-size: 16px; cursor: pointer; transition: all 0.2s;
    }
    .btn-send:disabled { background: #1a1a2e; color: #444; cursor: default; }
    .btn-send:not(:disabled):hover { transform: scale(1.05); }

    /* Spinner */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #666; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="logo">🔗</div>
      <div>
        <h1>GraphRAG Explorer</h1>
        <p>Knowledge Graph × Generative AI</p>
      </div>
      <div class="header-badge">Python + Flask + NetworkX</div>
    </div>
  </header>

  <main>
    <!-- Input Section -->
    <section class="input-section">
      <div class="sample-btns" id="sampleBtns"></div>
      <textarea id="inputText" rows="4"
        placeholder="テキストを入力するとナレッジグラフを自動構築します..."></textarea>
      <div class="action-row">
        <button class="btn-primary" id="btnExtract" onclick="extractGraph()">
          🧠 グラフ構築
        </button>
        <button class="btn-secondary" onclick="clearGraph()">🗑️ クリア</button>
        <span class="status-msg" id="statusMsg"></span>
      </div>
    </section>

    <!-- Main Grid -->
    <div class="grid">
      <!-- Left: Graph + Details -->
      <div>
        <div class="graph-wrap" id="graphWrap">
          <div class="graph-empty" id="graphEmpty">
            テキストを入力してグラフを構築してください
          </div>
          <svg id="graphSvg" viewBox="0 0 760 480" style="display:none;"></svg>
        </div>

        <div class="legend" id="legend" style="display:none;"></div>
        <div id="nodeDetail"></div>
        <div id="statsPanel"></div>
      </div>

      <!-- Right: Chat Panel -->
      <div class="chat-panel">
        <div class="chat-header">
          <span class="chat-header-title">💬 GraphRAG Q&A</span>
          <span class="chat-header-sub" id="chatSub">グラフ未構築</span>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="chat-placeholder">
            <div class="chat-placeholder-icon">🔍</div>
            ナレッジグラフに基づいて<br>質問に回答します
          </div>
        </div>
        <div class="chat-input">
          <input type="text" id="questionInput" placeholder="先にグラフを構築してください" disabled
            onkeydown="if(event.key==='Enter')askQuestion()">
          <button class="btn-send" id="btnSend" disabled onclick="askQuestion()">➤</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    // ─── State ─────────────────────────────────────────
    let graphData = { nodes: [], edges: [] };
    let positions = {};
    let selectedNode = null;
    let chatHistory = [];
    let animFrame = null;

    const COLORS = {
      person: "#ff6b6b", organization: "#4ecdc4", product: "#ffd93d",
      technology: "#6c5ce7", location: "#a8e6cf", event: "#fd79a8", default: "#636e72"
    };
    const ICONS = {
      person: "👤", organization: "🏢", product: "📦",
      technology: "⚡", location: "📍", event: "📅", default: "●"
    };

    const SAMPLES = [
      { label: "AI企業", text: "Anthropicは2021年にDario AmodeiとDaniela Amodeiによって設立されたAI安全性研究企業である。同社はClaudeという大規模言語モデルを開発している。Dario Amodeiは以前OpenAIの副社長を務めていた。OpenAIはSam Altmanが率いており、GPTシリーズを開発している。GoogleはDeepMindを買収し、Geminiモデルを開発した。DeepMindはDemis Hassabisによって設立された。MetaはMark Zuckerbergが率いており、LLaMAというオープンソースモデルを公開している。MistralはフランスのAIスタートアップで、Arthur Menschが共同設立した。" },
      { label: "日本のテック", text: "ソフトバンクグループは孫正義が率いる日本の大手投資会社である。ソフトバンクはARM Holdingsを買収し、AI半導体分野に大きな影響力を持つ。トヨタ自動車は豊田章男が会長を務め、自動運転技術の開発を進めている。トヨタはWoven by Toyotaという子会社を通じてスマートシティプロジェクトを推進している。ソニーグループは吉田憲一郎がCEOを務め、PlayStation事業やイメージセンサー事業を展開している。ソニーはHondaと合弁でソニー・ホンダモビリティを設立し、電気自動車AFEELAを開発している。楽天グループは三木谷浩史が設立し、楽天モバイルで通信事業に参入した。" },
      { label: "宇宙開発", text: "SpaceXはElon Muskによって2002年に設立された宇宙企業である。SpaceXはFalcon 9ロケットとStarshipを開発している。NASAはSpaceXと契約し、Artemis計画の月着陸船としてStarshipを選定した。JAXAは日本の宇宙機関で、H3ロケットを開発している。JAXAはSLIMミッションで月面着陸に成功した。Blue OriginはJeff Bezosが設立し、New Glennロケットを開発中である。ESAはヨーロッパの宇宙機関で、Ariane 6ロケットを運用している。ISROはインドの宇宙機関で、Chandrayaan-3で月の南極付近への着陸に成功した。" },
    ];

    // ─── Init ──────────────────────────────────────────
    (function init() {
      const wrap = document.getElementById("sampleBtns");
      SAMPLES.forEach(s => {
        const btn = document.createElement("button");
        btn.className = "sample-btn";
        btn.textContent = "📄 " + s.label;
        btn.onclick = () => document.getElementById("inputText").value = s.text;
        wrap.appendChild(btn);
      });
    })();

    // ─── API Calls ─────────────────────────────────────
    async function extractGraph() {
      const text = document.getElementById("inputText").value.trim();
      if (!text) return;

      const btn = document.getElementById("btnExtract");
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> 抽出中...';
      setStatus("エンティティと関係を抽出中...", "ok");

      try {
        const res = await fetch("/api/extract", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        graphData = data.graph;
        setStatus(`✅ +${data.added_nodes}ノード, +${data.added_edges}エッジ（合計 ${data.total_nodes}N / ${data.total_edges}E）`, "ok");
        renderGraph();
        updateLegend();
        loadStats();
        enableChat();
      } catch (err) {
        setStatus("❌ " + err.message, "err");
      }

      btn.disabled = false;
      btn.innerHTML = "🧠 グラフ構築";
    }

    async function askQuestion() {
      const input = document.getElementById("questionInput");
      const q = input.value.trim();
      if (!q || !graphData.nodes.length) return;

      input.value = "";
      addChatMsg("user", q);
      showTyping(true);

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q }),
        });
        const data = await res.json();
        showTyping(false);
        addChatMsg("assistant", data.answer || data.error);
      } catch (err) {
        showTyping(false);
        addChatMsg("assistant", "エラー: " + err.message);
      }
    }

    async function clearGraph() {
      await fetch("/api/clear", { method: "POST" });
      graphData = { nodes: [], edges: [] };
      positions = {};
      selectedNode = null;
      chatHistory = [];
      if (animFrame) cancelAnimationFrame(animFrame);
      document.getElementById("graphSvg").style.display = "none";
      document.getElementById("graphEmpty").style.display = "flex";
      document.getElementById("legend").style.display = "none";
      document.getElementById("nodeDetail").innerHTML = "";
      document.getElementById("statsPanel").innerHTML = "";
      document.getElementById("chatMessages").innerHTML = '<div class="chat-placeholder"><div class="chat-placeholder-icon">🔍</div>ナレッジグラフに基づいて<br>質問に回答します</div>';
      document.getElementById("chatSub").textContent = "グラフ未構築";
      document.getElementById("questionInput").disabled = true;
      document.getElementById("questionInput").placeholder = "先にグラフを構築してください";
      document.getElementById("btnSend").disabled = true;
      setStatus("", "ok");
    }

    async function loadStats() {
      try {
        const res = await fetch("/api/graph/stats");
        const s = await res.json();
        const panel = document.getElementById("statsPanel");
        let html = `<div class="stats-panel"><div class="stats-title">📊 グラフ統計（NetworkX）</div><div class="stats-grid">`;
        html += `<div class="stat-item"><div class="stat-value">${s.nodes}</div><div class="stat-label">ノード数</div></div>`;
        html += `<div class="stat-item"><div class="stat-value">${s.edges}</div><div class="stat-label">エッジ数</div></div>`;
        html += `<div class="stat-item"><div class="stat-value">${(s.density || 0).toFixed(3)}</div><div class="stat-label">密度</div></div>`;
        html += `<div class="stat-item"><div class="stat-value">${s.components || 0}</div><div class="stat-label">連結成分</div></div>`;
        html += `</div>`;
        if (s.top_central) {
          html += `<div style="margin-top:10px;font-size:11px;color:#aaa;">🏆 中心性TOP: `;
          html += s.top_central.map(n => `${n.label}(${n.centrality})`).join(", ");
          html += `</div>`;
        }
        html += `</div>`;
        panel.innerHTML = html;
      } catch (e) {}
    }

    // ─── Graph Rendering (Force Layout) ─────────────────
    const W = 760, H = 480;

    function renderGraph() {
      if (!graphData.nodes.length) return;

      const svg = document.getElementById("graphSvg");
      document.getElementById("graphEmpty").style.display = "none";
      svg.style.display = "block";

      // Initialize positions
      const cx = W / 2, cy = H / 2;
      graphData.nodes.forEach((n, i) => {
        if (!positions[n.id]) {
          const angle = (2 * Math.PI * i) / graphData.nodes.length;
          const r = Math.min(W, H) * 0.3;
          positions[n.id] = {
            x: cx + r * Math.cos(angle) + (Math.random() - 0.5) * 40,
            y: cy + r * Math.sin(angle) + (Math.random() - 0.5) * 40,
            vx: 0, vy: 0,
          };
        }
      });

      let iter = 0;
      const maxIter = 300;

      function step() {
        const damping = 0.82;
        const repK = 9000;
        const attrK = 0.006;
        const idealLen = 130;

        graphData.nodes.forEach(n => {
          let fx = 0, fy = 0;
          const p = positions[n.id];
          // Repulsion
          graphData.nodes.forEach(m => {
            if (n.id === m.id) return;
            const pm = positions[m.id];
            const dx = p.x - pm.x, dy = p.y - pm.y;
            const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
            const f = repK / (dist * dist);
            fx += (dx / dist) * f;
            fy += (dy / dist) * f;
          });
          // Attraction
          graphData.edges.forEach(e => {
            let other = null;
            if (e.source === n.id) other = e.target;
            else if (e.target === n.id) other = e.source;
            if (!other || !positions[other]) return;
            const po = positions[other];
            const dx = po.x - p.x, dy = po.y - p.y;
            const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
            const f = attrK * (dist - idealLen);
            fx += (dx / dist) * f;
            fy += (dy / dist) * f;
          });
          // Gravity
          fx += (cx - p.x) * 0.002;
          fy += (cy - p.y) * 0.002;

          p.vx = (p.vx + fx) * damping;
          p.vy = (p.vy + fy) * damping;
        });

        graphData.nodes.forEach(n => {
          const p = positions[n.id];
          p.x = Math.max(70, Math.min(W - 70, p.x + p.vx));
          p.y = Math.max(50, Math.min(H - 50, p.y + p.vy));
        });

        drawSvg();
        iter++;
        if (iter < maxIter) animFrame = requestAnimationFrame(step);
      }

      if (animFrame) cancelAnimationFrame(animFrame);
      animFrame = requestAnimationFrame(step);
    }

    function drawSvg() {
      const svg = document.getElementById("graphSvg");
      let html = `
        <defs>
          <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#4a4a6a"/>
          </marker>
      `;
      Object.entries(COLORS).forEach(([key, color]) => {
        html += `<radialGradient id="grad-${key}" cx="30%" cy="30%">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0.4"/>
        </radialGradient>`;
      });
      html += `</defs>`;

      // Edges
      graphData.edges.forEach((e, i) => {
        const s = positions[e.source], t = positions[e.target];
        if (!s || !t) return;
        const mx = (s.x + t.x) / 2, my = (s.y + t.y) / 2;
        const dx = t.x - s.x, dy = t.y - s.y;
        const dist = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
        const nx = -dy / dist * 14, ny = dx / dist * 14;
        const cx_ = mx + nx, cy_ = my + ny;
        html += `<path d="M${s.x},${s.y} Q${cx_},${cy_} ${t.x},${t.y}"
          fill="none" stroke="#3a3a5a" stroke-width="1.5" marker-end="url(#arrowhead)" opacity="0.7"/>`;
        html += `<text x="${cx_}" y="${cy_ - 6}" text-anchor="middle" fill="#8888aa" font-size="9"
          font-family="'Noto Sans JP',sans-serif">${e.label}</text>`;
      });

      // Nodes
      graphData.nodes.forEach(n => {
        const p = positions[n.id];
        if (!p) return;
        const color = COLORS[n.type] || COLORS.default;
        const isSel = selectedNode === n.id;
        const r = isSel ? 26 : 20;
        html += `<g style="cursor:pointer" onclick="selectNode('${n.id}')">
          <circle cx="${p.x}" cy="${p.y}" r="${r}" fill="url(#grad-${n.type || 'default'})"
            stroke="${isSel ? '#fff' : color}" stroke-width="${isSel ? 3 : 1.5}"
            filter="url(#glow)" opacity="0.9"/>
          <text x="${p.x}" y="${p.y + 4}" text-anchor="middle" fill="#fff" font-size="10"
            font-family="'Noto Sans JP',sans-serif">${ICONS[n.type] || ICONS.default}</text>
          <text x="${p.x}" y="${p.y + 34}" text-anchor="middle" fill="#ccc" font-size="10"
            font-family="'Noto Sans JP',sans-serif" font-weight="500">${n.label}</text>
        </g>`;
      });

      svg.innerHTML = html;
    }

    // ─── UI Helpers ────────────────────────────────────
    function selectNode(id) {
      selectedNode = selectedNode === id ? null : id;
      drawSvg();
      showNodeDetail();
    }

    async function showNodeDetail() {
      const wrap = document.getElementById("nodeDetail");
      if (!selectedNode) { wrap.innerHTML = ""; return; }

      try {
        const res = await fetch(`/api/node/${selectedNode}`);
        const data = await res.json();
        const color = COLORS[data.type] || COLORS.default;

        let html = `<div class="node-detail" style="border-color:${color}40">`;
        html += `<div class="node-detail-header">
          <span class="type-badge" style="background:${color}30;color:${color}">${data.type}</span>
          <span class="node-detail-name">${data.label}</span>
          <span style="font-size:11px;color:#666;margin-left:auto;">degree: ${data.degree}</span>
        </div>`;
        html += `<div class="node-relations">`;
        data.outgoing.forEach(n => {
          html += `→ <span>${n.relation}</span> → ${n.label}<br>`;
        });
        data.incoming.forEach(n => {
          html += `← <span>${n.relation}</span> ← ${n.label}<br>`;
        });
        html += `</div></div>`;
        wrap.innerHTML = html;
      } catch (e) {
        wrap.innerHTML = "";
      }
    }

    function updateLegend() {
      const legend = document.getElementById("legend");
      if (!graphData.nodes.length) { legend.style.display = "none"; return; }
      legend.style.display = "flex";

      const counts = {};
      graphData.nodes.forEach(n => { counts[n.type] = (counts[n.type] || 0) + 1; });

      let html = "";
      Object.entries(COLORS).forEach(([type, color]) => {
        if (type === "default" || !counts[type]) return;
        html += `<span class="legend-item"><span class="legend-dot" style="background:${color}"></span>${type} (${counts[type]})</span>`;
      });
      html += `<span class="legend-stats">${graphData.nodes.length} nodes · ${graphData.edges.length} edges</span>`;
      legend.innerHTML = html;
    }

    function enableChat() {
      const input = document.getElementById("questionInput");
      input.disabled = false;
      input.placeholder = "質問を入力...";
      document.getElementById("btnSend").disabled = false;
      document.getElementById("chatSub").textContent = `${graphData.nodes.length}ノードのグラフで検索`;
    }

    function addChatMsg(role, content) {
      const wrap = document.getElementById("chatMessages");
      // Remove placeholder
      const ph = wrap.querySelector(".chat-placeholder");
      if (ph) ph.remove();

      const div = document.createElement("div");
      div.className = `msg msg-${role}`;
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(content)}</div>`;
      wrap.appendChild(div);
      wrap.scrollTop = wrap.scrollHeight;
    }

    function showTyping(show) {
      const wrap = document.getElementById("chatMessages");
      const existing = wrap.querySelector(".typing-dots");
      if (existing) existing.remove();
      if (show) {
        const div = document.createElement("div");
        div.className = "typing-dots";
        div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
        wrap.appendChild(div);
        wrap.scrollTop = wrap.scrollHeight;
      }
    }

    function setStatus(msg, type) {
      const el = document.getElementById("statusMsg");
      el.textContent = msg;
      el.className = `status-msg status-${type}`;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
    }
  </script>
</body>
</html>
